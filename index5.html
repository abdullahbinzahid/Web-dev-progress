<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        h1 {
            color: brown;
        }
        p , a {
            color: aqua;
        }
    </style>
    <title>CSS Selectors</title>
</head>
<body>
    <!--Group Selector-->
    <h1>This is simple heading</h1>
    <p>This is p tag</p>
    <a href="#">This is anchor tag a </a>
</body>
</html>
